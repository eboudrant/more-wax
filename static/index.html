<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="More'Wax">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="apple-touch-icon" href="/static/logo.svg">
  <title>More'Wax — Vinyl Collection</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<!-- ── NAVBAR ───────────────────────────────────────────────── -->
<nav class="navbar">
  <span class="navbar-brand"><img src="/static/logo.svg" alt="More'Wax" style="height:28px;width:28px;vertical-align:middle;margin-right:6px;border-radius:50%"> More'Wax</span>
  <span id="nav-badge" class="badge" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border)">Loading…</span>
</nav>

<!-- ── TOOLBAR ──────────────────────────────────────────────── -->
<div id="toolbar">
  <i class="bi bi-search" style="color:var(--muted)"></i>
  <input id="filter-input" type="text" placeholder="Filter by artist, title, year…" oninput="filterCollection()">
  <button class="sort-btn active" id="sort-artist" onclick="setSort('artist')">Artist</button>
  <button class="sort-btn" id="sort-title"  onclick="setSort('title')">Title</button>
  <button class="sort-btn" id="sort-year"   onclick="setSort('year')">Year</button>
  <button class="sort-btn" id="sort-added"  onclick="setSort('added')">Recent</button>
  <button class="sort-btn" id="sort-price"  onclick="setSort('price')">Price</button>
  <span id="collection-count"></span>
</div>

<!-- ── MAIN CONTENT ─────────────────────────────────────────── -->
<div id="main-content">
  <div id="loading" class="spinner-wrapper"><div class="spinner-border"></div></div>
  <div id="collection-empty">
    <i class="bi bi-vinyl"></i>
    <h4>No records yet</h4>
    <p>Tap <strong>+</strong> to add your first vinyl</p>
  </div>
  <div id="collection-grid"></div>
</div>

<!-- ── FAB ─────────────────────────────────────────────────── -->
<button id="fab" onclick="openAddModal()" title="Add record">
  <i class="bi bi-plus-lg"></i>
</button>

<!-- ── TOAST CONTAINER ──────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ════════════════════════════════════════════════════════════
     ADD RECORD MODAL
     ════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="add-modal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Add a Record</h5>
        <button type="button" class="btn-close" onclick="closeAddModal()"></button>
      </div>

      <div class="modal-body" id="add-modal-body">
        <!-- Steps injected by JS -->
      </div>

      <div class="modal-footer" id="add-modal-footer">
        <!-- Buttons injected by JS -->
      </div>

    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     RECORD DETAIL MODAL
     ════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="detail-modal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="detail-title">Record Detail</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detail-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="/static/js/state.js"></script>
<script src="/static/js/helpers.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/collection.js"></script>
<script src="/static/js/detail.js"></script>
<script src="/static/js/image-convert.js"></script>
<script src="/static/js/camera.js"></script>
<script src="/static/js/search.js"></script>
<script src="/static/js/photo-search.js"></script>
<script src="/static/js/add-modal.js"></script>
<script src="/static/js/init.js"></script>
</body>
</html>
