<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Label circle -->
  <circle cx="100" cy="100" r="98" fill="#f0f0f0"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#ccc" stroke-width="0.6" opacity="0.7"/>

  <!-- Record name: MORE'WAX -->
  <g fill="#111">
    <!-- MORE' — top -->
    <text font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="24" letter-spacing="2" text-anchor="middle" x="100" y="72">MORE'</text>
    <!-- WAX — bottom, larger -->
    <text font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="36" letter-spacing="4" text-anchor="middle" x="100" y="155">WAX</text>
  </g>

  <!-- Thin separator lines -->
  <line x1="55" y1="78" x2="145" y2="78" stroke="#bbb" stroke-width="0.6" opacity="0.5"/>
  <line x1="55" y1="120" x2="145" y2="120" stroke="#bbb" stroke-width="0.6" opacity="0.5"/>

  <!-- Small label info text -->
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="6" fill="#999" text-anchor="middle" x="100" y="170" letter-spacing="2">VINYL COLLECTION</text>

  <!-- Spindle hole -->
  <circle cx="100" cy="100" r="5" fill="#333"/>
  <circle cx="100" cy="100" r="5" fill="none" stroke="#bbb" stroke-width="0.8"/>
</svg>
